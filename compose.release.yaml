# Prebuilt-image variant of compose.yaml.
#
# Identical stack to compose.yaml, except the json-tables and mcp-server
# services pull ready-made images from GHCR instead of building from source.
# This skips the local Rust/pip compile (the slow part of a first install).
#
# Image references come from the installer-written .env:
#   EXASOL_JSON_TABLES_IMAGE, EXASOL_MCP_IMAGE
# The defaults below are a safety net if those are unset.
services:
  nano:
    image: ${EXASOL_NANO_IMAGE:-docker.io/exasol/nano:latest}
    container_name: exasol-ai-nano
    shm_size: "512m"
    ports:
      - "127.0.0.1:${EXASOL_SQL_PORT:-8563}:8563"
      - "127.0.0.1:${EXASOL_WEB_PORT:-8443}:8443"
    volumes:
      - exasol-ai-data:/exa
    stdin_open: true
    tty: true

  mcp-server:
    image: ${EXASOL_MCP_IMAGE:-ghcr.io/krishna-exasol/exasol-ai-mcp:0.1.0}
    container_name: exasol-ai-mcp
    depends_on:
      - nano
    ports:
      - "127.0.0.1:${EXASOL_MCP_PORT:-4896}:4896"
    environment:
      EXA_DSN: nano:8563
      EXA_USER: sys
      EXA_PASSWORD: exasol
      EXA_SSL_CERT_VALIDATION: "false"
      EXA_MCP_SETTINGS: /config/mcp-settings.json
      EXA_MCP_LOG_LEVEL: INFO
      EXA_MCP_LOG_TO_CONSOLE: "true"
    volumes:
      - ./mcp-settings.json:/config/mcp-settings.json:ro

  json-tables:
    image: ${EXASOL_JSON_TABLES_IMAGE:-ghcr.io/krishna-exasol/exasol-ai-json-tables:0.1.0}
    container_name: exasol-ai-json-tables
    depends_on:
      - nano
    working_dir: /workspace
    # JSON Tables is a CLI tool with no server process. To keep it running as a
    # standing container, override the image entrypoint with a keep-alive and
    # invoke the CLI on demand via: docker compose exec json-tables exasol-json-tables ...
    entrypoint: ["sleep", "infinity"]
    restart: unless-stopped
    environment:
      EXASOL_DSN: nano:8563
      EXASOL_USER: sys
      EXASOL_PASSWORD: exasol
    volumes:
      - ./workspace:/workspace

volumes:
  exasol-ai-data:
