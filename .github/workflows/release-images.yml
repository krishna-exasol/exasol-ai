name: Release images

# Builds the JSON Tables and MCP Server images once, in CI, and publishes them
# to GitHub Container Registry (GHCR). Users on the prebuilt install path then
# `docker pull` these instead of compiling the JSON Tables Rust engine locally.
#
# Triggered by pushing a version tag (e.g. v0.1.0) or run manually.
# The upstream component sources (nano / json-tables / mcp-server) are NOT
# modified here: their unmodified source is cloned/installed inside the image
# build and published under this repo's namespace.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (without the leading v, e.g. 0.1.0)"
        required: true
        default: "0.1.0"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # Pinned component sources baked into the published images. Keep these in
  # sync with manifest.json before cutting a release.
  JSON_TABLES_REPOSITORY: https://github.com/exasol-labs/exasol-json-tables.git
  JSON_TABLES_REF: main
  MCP_SERVER_VERSION: "1.10.1"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: exasol-ai-json-tables
            dockerfile: Dockerfile.json-tables
          - image: exasol-ai-mcp
            dockerfile: Dockerfile.mcp
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:latest
          build-args: |
            EXASOL_JSON_TABLES_REPOSITORY=${{ env.JSON_TABLES_REPOSITORY }}
            EXASOL_JSON_TABLES_REF=${{ env.JSON_TABLES_REF }}
            EXASOL_MCP_SERVER_VERSION=${{ env.MCP_SERVER_VERSION }}
          provenance: false
